<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrasi Kelas - Haris DevLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #4a5b70;
      --navy-dark: #3b4a5c;
      --teal: #6aa84f;
      --teal-dark: #588a41;
      --teal-light: #eaf3e5;
      --teal-border-light: #cfe6c2;
      --teal-bg-light: #f6faf4;
      --teal-text: #ffffff;
      --border: #c9d3d6;
      --ink: #1f2a30;
      --muted: #5c6b70;
      --paper: #ffffff;
      --bg: #eef1f2;
    }

    * {
      box-sizing: border-box;
    }

    * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }

    body {
      margin: 0;
      font-family: 'Trebuchet MS', 'Inter', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: 100vh;
    }

    /* ---------- MOBILE RESPONSIVE ---------- */
    @media screen and (max-width: 800px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }
      .editor {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: none;
        overflow-y: visible;
        padding: 14px 14px 40px;
      }
      .preview-wrap {
        height: auto;
        min-height: auto;
      }
      .canvas {
        padding: 16px 4px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      #page-container {
        transform-origin: top left;
        max-width: 100%;
      }
      .toolbar {
        padding: 8px 10px;
        flex-wrap: wrap;
        gap: 6px;
        position: relative;
      }
      .toolbar .grp {
        font-size: 11px;
        gap: 4px;
      }
      .toolbar select {
        font-size: 11px;
        padding: 4px 6px;
      }
      .btn-print {
        position: fixed;
        top: auto !important;
        bottom: 16px;
        right: 16px;
        left: 16px;
        width: auto;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 24px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        z-index: 9999;
        white-space: nowrap;
        text-align: center;
      }
      #accountBadge {
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 10px;
      }
      .row2 {
        grid-template-columns: 1fr;
      }
      .section > summary {
        font-size: 12px;
        padding: 8px 10px;
      }
      .section .body {
        padding: 10px;
      }
      .toggle-grp {
        font-size: 10px;
      }
    }

    /* ---------- EDITOR PANEL ---------- */
    .editor {
      overflow-y: auto;
      background: var(--paper);
      border-right: 1px solid var(--border);
      padding: 18px 20px 60px;
    }

    .editor h1 {
      font-size: 17px;
      color: var(--navy);
      margin: 0 0 2px;
    }

    .editor .sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .section>summary {
      background: var(--navy);
      color: #fff;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
    }

    .section>summary::-webkit-details-marker {
      display: none;
    }

    .section>summary::before {
      content: "▸ ";
    }

    .section[open]>summary::before {
      content: "▾ ";
    }

    .section .body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--navy-dark);
      display: block;
      margin-bottom: 3px;
    }

    input[type=text],
    input[type=number],
    textarea,
    select {
      width: 100%;
      font-family: inherit;
      font-size: 12.5px;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fbfcfc;
      color: var(--ink);
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field {
      margin-bottom: 2px;
    }

    /* ---------- PREVIEW PANEL ---------- */
    .preview-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .toolbar .grp {
      font-size: 11px;
      font-weight: bold;
      color: var(--navy-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar select {
      width: auto;
      padding: 4px 8px;
      font-size: 11.5px;
    }

    .toolbar .spacer {
      flex: 1;
    }

    .btn-print {
      background: var(--navy);
      color: #fff;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      box-shadow: 0 2px 4px rgba(74, 91, 112, 0.2);
      transition: background .2s;
    }

    .btn-print:hover {
      background: var(--navy-dark);
    }

    .toggle-grp {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: bold;
      color: var(--navy-dark);
      cursor: pointer;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 16px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #cbd5e0;
      transition: .2s;
      border-radius: 16px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    .toggle-switch input:checked+.toggle-slider {
      background-color: var(--teal);
    }

    .toggle-switch input:checked+.toggle-slider:before {
      transform: translateX(12px);
    }

    .canvas {
      flex: 1;
      overflow-y: auto;
      scrollbar-gutter: stable;
      text-align: center;
      padding: 40px 20px;
      background: #e4e8eb;
      background-image: radial-gradient(#c4cbd0 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #page-container {
      display: inline-block;
      position: relative;
      text-align: left;
      vertical-align: top;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 1px 8px rgba(0, 0, 0, 0.1);
      border-radius: 4px;
      background: var(--paper);
    }

    .sheet {
      background: var(--paper);
      padding: 15mm;
      font-size: 11px;
      line-height: 1.45;
      margin: 0;
    }

    .sheet.a4.portrait {
      width: 210mm;
      min-height: 297mm;
    }

    .sheet.a4.landscape {
      width: 297mm;
      min-height: 210mm;
    }

    .sheet.f4.portrait {
      width: 215mm;
      min-height: 330mm;
    }

    .sheet.f4.landscape {
      width: 330mm;
      min-height: 215mm;
    }

    /* ---- Paper Patterns ---- */
    .sheet.pattern-y-so-serious {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/y-so-serious-white.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-double-bubble {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/double-bubble-outline.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-papyrus {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/papyrus.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-leaves {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/leaves.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-hotel-wallpaper {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/hotel-wallpaper.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-full-bloom {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/full-bloom.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-grid {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/gridme.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-lined {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/linedpaper.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-waves {
      background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/white-waves.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-ricepaper {
      background-image: url('https://raw.githubusercontent.com/atlemo/SubtlePatterns/master/ricepaper.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-linen {
      background-image: url('https://raw.githubusercontent.com/atlemo/SubtlePatterns/master/linen.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-graphy {
      background-image: url('https://raw.githubusercontent.com/atlemo/SubtlePatterns/master/graphy.png') !important;
      background-repeat: repeat !important;
    }

    .sheet.pattern-subtle_dots {
      background-image: url('https://raw.githubusercontent.com/atlemo/SubtlePatterns/master/subtle_dots.png') !important;
      background-repeat: repeat !important;
    }

    /* ---------- LAYOUT CETAK / PREVIEW ---------- */
    .m-header {
      display: flex;
      align-items: center;
      gap: 15px;
      border: 2px solid var(--navy-dark);
      background: var(--teal-bg-light);
      padding: 10px 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    .m-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 55px;
      height: 55px;
    }

    .m-logo svg,
    .m-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .m-title {
      flex: 1;
      font-size: 14px;
      font-weight: 800;
      color: var(--teal-text);
      background: var(--navy);
      padding: 6px 12px;
      border-radius: 4px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .m-badge {
      font-size: 8.5px;
      font-weight: 700;
      text-align: center;
      border: 1px solid var(--navy);
      padding: 4px 8px;
      border-radius: 4px;
      background: #fff;
      line-height: 1.3;
      min-width: 90px;
    }

    table.mtab {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
    }

    table.mtab th,
    table.mtab td {
      border: 1px solid var(--border);
      padding: 5px 8px;
      font-size: 11px;
    }

    table.mtab td.key {
      font-weight: 700;
      width: 25%;
      background: var(--teal-bg-light);
      color: var(--navy-dark);
    }

    /* Styles for curriculum tables */
    table.adm-tab {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 12.5px;
    }

    table.adm-tab th {
      background: var(--navy);
      color: white;
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-weight: 700;
      text-align: center;
    }

    table.adm-tab td {
      border: 1px solid var(--border);
      padding: 7px 8px;
      vertical-align: middle;
      color: var(--ink);
    }

    table.adm-tab tr:nth-child(even) td {
      background: #f8fafb;
    }

    table.prosem-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      margin-top: 10px;
    }

    table.prosem-table th,
    table.prosem-table td {
      border: 1px solid var(--border);
      padding: 4px 2px;
      text-align: center;
    }

    table.prosem-table th {
      background: var(--navy);
      color: white;
      font-weight: bold;
    }

    table.prosem-table td.materi-cell {
      text-align: left;
      padding-left: 6px;
      font-weight: 500;
    }

    table.prosem-table .cell-as {
      background: #e67e22 !important;
      color: white !important;
      font-weight: bold;
    }

    table.prosem-table .cell-jp {
      font-weight: bold;
    }

    table.prosem-table tr.total-row td {
      background: #eaf3e5;
      font-weight: bold;
      color: #3b4a5c;
    }

    .sign-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 30px;
      font-size: 11px;
      line-height: 1.4;
      page-break-inside: avoid;
    }

    .sign-grid div {
      text-align: center;
    }

    .sign-grid .gap {
      height: 55px;
    }

    .sign-grid .name {
      font-weight: 700;
      text-decoration: underline;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .canvas {
        padding: 0;
        overflow: visible;
        display: block;
        background: transparent !important;
        background-image: none !important;
      }

      .preview-wrap {
        height: auto !important;
        display: block !important;
      }

      #page-container {
        display: block !important;
        width: auto !important;
        height: auto !important;
        box-shadow: none !important;
        margin: 0 !important;
        padding: 0 !important;
        background: none !important;
      }

      .app {
        display: block;
        height: auto;
      }

      .sheet {
        box-shadow: none;
        margin: 0 !important;
        padding: 0 !important;
        width: auto !important;
        min-height: 0 !important;
        transform: none !important;
        background: transparent !important;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- =============== EDITOR =============== -->
    <div class="editor no-print">
      <div id="accountBadge" style="display: none; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 10px 12px; background: #eaf3e5; border: 1px solid #cfe6c2; border-radius: 6px;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div id="accountBadgeAvatar" style="width: 38px; height: 38px; border-radius: 50%; background: conic-gradient(#DB4437 0deg 90deg, #F4B400 90deg 180deg, #0F9D58 180deg 270deg, #4285F4 270deg 360deg); padding: 2.5px; flex-shrink: 0;">
            <div style="width: 100%; height: 100%; border-radius: 50%; background: var(--teal); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; overflow: hidden;" id="accountBadgeAvatarInner">U</div>
          </div>
          <div>
            <div style="font-size: 10px; color: var(--muted); font-weight: 600; line-height: 1;">Akun Google Aktif:</div>
            <div id="accountBadgeName" style="font-size: 13px; font-weight: bold; color: var(--navy-dark); line-height: 1.4;"></div>
            <div id="accountBadgeEmail" style="font-size: 11px; color: var(--navy); line-height: 1;"></div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <div id="cloudSyncStatus" style="display: none; align-items: center; gap: 4px; font-size: 11px; color: var(--navy); opacity: 0.8;" title="Tersimpan di Cloud">
            <svg id="cloudSyncIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- Default: Saved -->
              <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
              <polyline points="9 14 11 16 15 11"></polyline>
            </svg>
            <span id="cloudSyncText" style="display:none; font-weight:600;">Tersimpan</span>
          </div>
          <button onclick="logoutGoogle()" style="background: #fff; border: 1px solid #e0e0e0; color: #c53030; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;">Logout</button>
        </div>
      </div>
      <h1>Generator Modul Ajar</h1>
      <div class="sub">Manajemen perangkat administrasi pembelajaran. Haris DevLab.</div>

      <!-- Navigation Tabs -->
      <div style="display: flex; gap: 8px; margin-bottom: 18px; border-bottom: 2px solid var(--bg); padding-bottom: 8px;" class="no-print">
        <a href="index.html" style="text-decoration: none; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; background: #eef1f2; color: var(--navy-dark); display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border);">
          <span>📝</span> Modul Ajar
        </a>
        <a href="administrasi.html" style="text-decoration: none; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 6px; background: var(--navy); color: white; display: inline-flex; align-items: center; gap: 6px;">
          <span>📂</span> Administrasi Kelas
        </a>
      </div>

      <details class="section" open>
        <summary>Pilihan Administrasi</summary>
        <div class="body">
          <div class="field">
            <label>Jenis Perangkat Administrasi</label>
            <select id="docType" onchange="onDocTypeChange()">
              <option value="prosem">Program Semester (PROSEM)</option>
              <option value="prota">Program Tahunan (PROTA)</option>
              <option value="tp">Tujuan Pembelajaran (TP)</option>
              <option value="jadwal">Jadwal Jam Mengajar</option>
            </select>
          </div>
          <div class="field" id="fieldKelas">
            <label>Tingkat Kelas</label>
            <select id="docKelas" onchange="renderPreview()">
              <option value="IV">Kelas IV (Empat)</option>
              <option value="V">Kelas V (Lima)</option>
              <option value="VI" selected>Kelas VI (Enam)</option>
            </select>
          </div>
        </div>
      </details>

      <details class="section" open>
        <summary>Identitas Lembaga & Guru</summary>
        <div class="body">
          <div class="field">
            <label>Nama Lembaga/Sekolah</label>
            <input type="text" id="instansi" value="SDS PLUS 2 ALMUHAJIRIN" oninput="saveProfileFields(); renderPreview()">
          </div>
          <div class="field">
            <label>Mata Pelajaran</label>
            <input type="text" id="mapel" value="Koding dan Kecerdasan Artifisial (KKA)" oninput="saveProfileFields(); renderPreview()">
          </div>
          <div class="row2">
            <div class="field">
              <label>Tahun Pelajaran</label>
              <input type="text" id="tahun" value="2026/2027" oninput="saveProfileFields(); renderPreview()">
            </div>
            <div class="field">
              <label>Fase</label>
              <input type="text" id="fase" value="Fase C" oninput="saveProfileFields(); renderPreview()">
            </div>
          </div>
          <div class="field">
            <label>Tempat &amp; Tanggal Dokumen</label>
            <input type="text" id="tempatTgl" value="Purwakarta, 10 Juli 2026" oninput="saveProfileFields(); renderPreview()">
          </div>
        </div>
      </details>

      <details class="section">
        <summary>Tanda Tangan</summary>
        <div class="body">
          <div class="row2">
            <div class="field">
              <label>Nama Kepala Sekolah</label>
              <input type="text" id="kepsekNama" value="Hj. Lia Yulindaria, S.P.,S.Pd.,M.Pd." oninput="saveProfileFields(); renderPreview()">
            </div>
            <div class="field">
              <label>NIY/NIP Kepala Sekolah</label>
              <input type="text" id="kepsekNIY" value="07699114" oninput="saveProfileFields(); renderPreview()">
            </div>
          </div>
          <div class="row2">
            <div class="field">
              <label>Nama Guru Bidang Studi</label>
              <input type="text" id="guruNama" value="Haris Ratno Pambudi, S.T." oninput="saveProfileFields(); renderPreview()">
            </div>
            <div class="field">
              <label>NIY/NIP Guru</label>
              <input type="text" id="guruNIY" value="236991324" oninput="saveProfileFields(); renderPreview()">
            </div>
          </div>
        </div>
      </details>

    </div>

    <!-- =============== PREVIEW =============== -->
    <div class="preview-wrap">
      <div class="toolbar no-print">
        <div class="grp">Ukuran Kertas:
          <select id="paperSize" onchange="updatePageStyle()">
            <option value="a4">A4</option>
            <option value="f4" selected>F4 / Folio</option>
          </select>
        </div>
        <div class="grp">Orientasi:
          <select id="orientation" onchange="updatePageStyle()">
            <option value="portrait">Portrait</option>
            <option value="landscape" selected>Landscape</option>
          </select>
        </div>
        <div class="grp">Pattern Kertas:
          <select id="paperPattern" onchange="onPatternChange()">
            <option value="none">Polos (Putih)</option>
            <optgroup label="Tekstur Kertas &amp; Serat">
              <option value="y-so-serious">Y-So-Serious</option>
              <option value="ricepaper">Rice Paper (Kertas Beras)</option>
              <option value="linen" selected>White Linen (Serat Linen)</option>
              <option value="papyrus">Papyrus (Serat Papirus)</option>
              <option value="lined">Garis Buku (Lined)</option>
            </optgroup>
            <optgroup label="Geometris &amp; Struktur">
              <option value="grid">Grid Kotak (Matematika)</option>
              <option value="graphy">Graphy (Kertas Grafik)</option>
              <option value="subtle_dots">Subtle Dots (Titik Halus)</option>
              <option value="waves">Gelombang Halus</option>
              <option value="double-bubble">Double Bubble</option>
            </optgroup>

    function applyZoom() {
      const z = document.getElementById('zoom').value;
      const page = document.getElementById('page');
      const container = document.getElementById('page-container');
      const canvas = document.querySelector('.canvas');
      if (!page || !container || !canvas) return;

      const size = document.getElementById('paperSize').value;
      const orient = document.getElementById('orientation').value;
      const [w, h] = sizes[size][orient];

      const pagePxWidth = w * 3.7795;
      const pagePxHeight = h * 3.7795;

      let scale = 1;
      if (z === "fit") {
        const canvasWidth = canvas.clientWidth - 40;
        scale = canvasWidth / pagePxWidth;
        scale = Math.min(Math.max(scale, 0.4), 1.2);
      } else {
        scale = parseFloat(z);
      }

      page.style.transform = `scale(${scale})`;
      page.style.transformOrigin = "top left";

      container.style.width = `${pagePxWidth * scale}px`;
      container.style.height = `${page.offsetHeight * scale}px`;
    }

      mint: { primary: '#a8e6cf', dark: '#5eb393', light: '#f2fcf9', borderLight: '#ccefed', bgLight: '#fafdfd', text: '#1e523f', navy: '#2c5e4b', navyDark: '#1c3e30', hue: 159 },
      sage: { primary: '#87a987', dark: '#5b7d5b', light: '#f4f7f4', borderLight: '#d2dfd2', bgLight: '#fbfcfb', text: '#2d4c2d', navy: '#3a593a', navyDark: '#263b26', hue: 120 },
      sky: { primary: '#9dd3e8', dark: '#569fbd', light: '#f2f9fc', borderLight: '#cce6f2', bgLight: '#fafcfd', text: '#1b334a', navy: '#2c3e50', navyDark: '#1a252f', hue: 210 },
      lavender: { primary: '#b3c5ff', dark: '#4860b3', light: '#f2f5ff', borderLight: '#d9e2ff', bgLight: '#fcfdff', text: '#1a2b66', navy: '#2b3b73', navyDark: '#1a2652', hue: 227 },
      lilac: { primary: '#d6c1e9', dark: '#73568f', light: '#faf6fc', borderLight: '#ebdffd', bgLight: '#fdfbfd', text: '#3f2952', navy: '#4a3b5c', navyDark: '#342942', hue: 270 },
      rose: { primary: '#ebb7b7', dark: '#965b5b', light: '#fdf6f6', borderLight: '#f5dbdb', bgLight: '#fffdfd', text: '#5c2d2d', navy: '#6e3b3b', navyDark: '#4f2a2a', hue: 350 },
      sakura: { primary: '#ffc2d1', dark: '#ab4860', light: '#fff5f7', borderLight: '#ffe0e6', bgLight: '#fffcfd', text: '#661a2b', navy: '#732033', navyDark: '#521221', hue: 345 },
      coral: { primary: '#f7b7a3', dark: '#a85d43', light: '#fef6f3', borderLight: '#fcdcd1', bgLight: '#fffdfd', text: '#602e1c', navy: '#703926', navyDark: '#4c2417', hue: 14 },
      cream: { primary: '#ebd2b0', dark: '#8c6f46', light: '#fcf7f0', borderLight: '#f3e4d3', bgLight: '#fdfdfb', text: '#4a3820', navy: '#5a4a3a', navyDark: '#44372b', hue: 34 },
      butter: { primary: '#fae8a4', dark: '#8f7a2a', light: '#fdfcf5', borderLight: '#f7f1d3', bgLight: '#fffefd', text: '#4a3e10', navy: '#5a4c14', navyDark: '#3d330c', hue: 48 },
      ocean: { primary: '#aedcd8', dark: '#528c87', light: '#f0f8f7', borderLight: '#cceae7', bgLight: '#fafdfd', text: '#1f4845', navy: '#214e4b', navyDark: '#153331', hue: 175 },
      steel: { primary: '#b8c5cd', dark: '#5a6f7d', light: '#f3f6f8', borderLight: '#dae3e8', bgLight: '#fafbfb', text: '#233441', navy: '#344855', navyDark: '#23333d', hue: 203 }
    };

    function applyPresetTheme(themeKey) {
      const sliderGrp = document.getElementById('sliderGroup');
      if (themeKey === 'custom') {
        if (sliderGrp) sliderGrp.style.display = 'flex';
        const sliderEl = document.getElementById('themeHue');
        const currentHue = sliderEl ? sliderEl.value : 102;
        applyHueTheme(currentHue);
        return;
      }
      if (sliderGrp) sliderGrp.style.display = 'none';

      const t = themes[themeKey] || themes.original;
      const page = document.getElementById('page');
      if (page) {
        page.style.setProperty('--teal', t.primary);
        page.style.setProperty('--teal-dark', t.dark);
        page.style.setProperty('--teal-light', t.light);
        page.style.setProperty('--teal-border-light', t.borderLight);
        page.style.setProperty('--teal-bg-light', t.bgLight);
        page.style.setProperty('--teal-text', t.text || '#ffffff');
        page.style.setProperty('--navy', t.navy || '#4a5b70');
        page.style.setProperty('--navy-dark', t.navyDark || '#3b4a5c');
      }

      const themeSelect = document.getElementById('paperTheme');
      if (themeSelect) themeSelect.value = themeKey;

      const sliderEl = document.getElementById('themeHue');
      if (sliderEl && t.hue !== undefined) {
        sliderEl.value = t.hue;
        const valEl = document.getElementById('hueVal');
        if (valEl) valEl.textContent = t.hue + '°';
      }

      try {
        localStorage.setItem('hdl_paper_theme_mode', themeKey);
      } catch (e) {}
    }

    function applyHueTheme(hue) {
      const h = parseInt(hue);
      const sliderGrp = document.getElementById('sliderGroup');
      if (sliderGrp) sliderGrp.style.display = 'flex';

      const primary = `hsl(${h}, 45%, 70%)`;
      const dark = `hsl(${h}, 45%, 45%)`;
      const light = `hsl(${h}, 45%, 96%)`;
      const borderLight = `hsl(${h}, 45%, 88%)`;
      const bgLight = `hsl(${h}, 45%, 98%)`;
      const text = `hsl(${h}, 50%, 20%)`;
      const navy = `hsl(${h}, 30%, 30%)`;
      const navyDark = `hsl(${h}, 30%, 22%)`;

      const page = document.getElementById('page');
      if (page) {
        page.style.setProperty('--teal', primary);
        page.style.setProperty('--teal-dark', dark);
        page.style.setProperty('--teal-light', light);
        page.style.setProperty('--teal-border-light', borderLight);
        page.style.setProperty('--teal-bg-light', bgLight);
        page.style.setProperty('--teal-text', text);
        page.style.setProperty('--navy', navy);
        page.style.setProperty('--navy-dark', navyDark);
      }

      const valEl = document.getElementById('hueVal');
      if (valEl) valEl.textContent = h + '°';

      const sliderEl = document.getElementById('themeHue');
      if (sliderEl) sliderEl.value = h;

      const themeSelect = document.getElementById('paperTheme');
      if (themeSelect) themeSelect.value = 'custom';

      try {
        localStorage.setItem('hdl_paper_theme_mode', 'custom');
        localStorage.setItem('hdl_paper_theme_hue', h);
      } catch (e) {}
    }

    const PERSIST_PROFILE_FIELDS = [
      'penyusun', 'instansi', 'tahun', 'jenjang', 'mapel', 'fase',
      'tempatTgl', 'kepsekNama', 'kepsekNIY', 'guruNama', 'guruNIY'
    ];
    const PERSIST_PROFILE_CHECKBOXES = [
      'toggleBanner', 'toggleLogoYayasan'
    ];

    let cloudSyncTimeout = null;

    function updateCloudSyncStatus(state) {
      const icon = document.getElementById('cloudSyncIcon');
      const text = document.getElementById('cloudSyncText');
      const statusDiv = document.getElementById('cloudSyncStatus');
      if (!icon || !text || !statusDiv) return;
      
      const isLogged = localStorage.getItem('hdl_access_code') && localStorage.getItem('hdl_access_code').startsWith('google_jwt_token:');
      if (!isLogged) {
        statusDiv.style.display = 'none';
        return;
      }
      statusDiv.style.display = 'flex';

      if (state === 'syncing') {
        icon.innerHTML = '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><polyline points="12 11 12 16"></polyline><polyline points="9 13 12 11 15 13"></polyline>';
        icon.style.color = 'var(--navy)';
        text.textContent = 'Menyimpan...';
        text.style.display = 'inline';
        statusDiv.title = 'Menyimpan ke Cloud...';
      } else if (state === 'saved') {
        icon.innerHTML = '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><polyline points="9 14 11 16 15 11"></polyline>';
        icon.style.color = '#38a169'; // green
        text.textContent = 'Tersimpan';
        text.style.display = 'none';
        statusDiv.title = 'Tersimpan di Cloud';
      } else if (state === 'error') {
        icon.innerHTML = '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><line x1="12" y1="12" x2="12" y2="16"></line><line x1="12" y1="18" x2="12.01" y2="18"></line>';
        icon.style.color = '#e53e3e'; // red
        text.textContent = 'Gagal Simpan';
        text.style.display = 'inline';
        statusDiv.title = 'Gagal menyimpan ke Cloud';
      }
    }

    function getProfileStorageKey(id) {
       const userEmail = (localStorage.getItem('hdl_user_email') || '').trim().toLowerCase();
       return userEmail ? `hdl_persisted_${userEmail}_${id}` : `hdl_persisted_${id}`;
    }

    function saveProfileFields() {
      try {
        let profileData = { fields: {}, checkboxes: {} };
        PERSIST_PROFILE_FIELDS.forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            localStorage.setItem(getProfileStorageKey(id), el.value);
            profileData.fields[id] = el.value;
          }
        });
        PERSIST_PROFILE_CHECKBOXES.forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            const val = el.checked ? 'true' : 'false';
            localStorage.setItem(getProfileStorageKey(id), val);
            profileData.checkboxes[id] = val;
          }
        });

        // Sync to cloud if logged in, debounced (wait 2 seconds after last typing)
        const token = localStorage.getItem('hdl_access_code');
        if (token && token.startsWith('google_jwt_token:')) {
           updateCloudSyncStatus('syncing');
           clearTimeout(cloudSyncTimeout);
           cloudSyncTimeout = setTimeout(() => {
              // Re-read latest profile fields for cloud sync to avoid closure capturing old/default values
              let latestProfileData = { fields: {}, checkboxes: {} };
              PERSIST_PROFILE_FIELDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) latestProfileData.fields[id] = el.value;
              });
              PERSIST_PROFILE_CHECKBOXES.forEach(id => {
                const el = document.getElementById(id);
                if (el) latestProfileData.checkboxes[id] = el.checked ? 'true' : 'false';
              });

              fetch('https://bold-block-f2cd.harisratnopambudi.workers.dev/profile', {
                 method: 'POST',
                 headers: { 'Authorization': 'Bearer ' + token },
                 body: JSON.stringify(latestProfileData)
              }).then(res => {
                 if (res.ok) updateCloudSyncStatus('saved');
                 else {
                     res.text().then(txt => {
                         console.error("Cloud sync err:", res.status, txt);
                         const statusDiv = document.getElementById('cloudSyncStatus');
                         if(statusDiv) statusDiv.title = `Gagal (Kode: ${res.status}). Tunggu atau relogin.`;
                     }).catch(e=>{});
                     updateCloudSyncStatus('error');
                 }
              }).catch(e => {
                 console.error("Cloud sync failed", e);
                 updateCloudSyncStatus('error');
              });
           }, 2000);
        }
      } catch (e) { }
    }

    async function loadProfileFields() {
      try {
        // Try cloud first if logged in
        const token = localStorage.getItem('hdl_access_code');
        if (token && token.startsWith('google_jwt_token:')) {
           try {
              const res = await fetch('https://bold-block-f2cd.harisratnopambudi.workers.dev/profile', {
                 headers: { 'Authorization': 'Bearer ' + token }
              });
              if (res.ok) {
                 const cloudData = await res.json();
                 if (cloudData && cloudData.fields) {
                    // Save to local storage and update UI
                    for (const id in cloudData.fields) {
                       localStorage.setItem(getProfileStorageKey(id), cloudData.fields[id]);
                    }
                    for (const id in cloudData.checkboxes) {
                       localStorage.setItem(getProfileStorageKey(id), cloudData.checkboxes[id]);
                    }
                 }
              }
           } catch(e) {
              console.error("Failed to load profile from cloud", e);
           }
        }

        // Load from local storage
        PERSIST_PROFILE_FIELDS.forEach(id => {
          const val = localStorage.getItem(getProfileStorageKey(id));
          const el = document.getElementById(id);
          if (val !== null && el) {
            el.value = val;
          }
          // Attach auto-save listener
          if (el && !el.dataset.autosaveAttached) {
             el.addEventListener('input', saveProfileFields);
             el.dataset.autosaveAttached = 'true';
          }
        });
        PERSIST_PROFILE_CHECKBOXES.forEach(id => {
          const val = localStorage.getItem(getProfileStorageKey(id));
          const el = document.getElementById(id);
          if (val !== null && el) {
            el.checked = (val === 'true');
          }
          // Attach auto-save listener
          if (el && !el.dataset.autosaveAttached) {
             el.addEventListener('change', saveProfileFields);
             el.dataset.autosaveAttached = 'true';
          }
        });
        
        if (typeof renderPreview === 'function') {
           renderPreview();
        }
      } catch (e) { }
    }

    function checkLoginBadge() {
      try {
        const savedCode = localStorage.getItem('hdl_access_code') || '';
        const badge = document.getElementById('accountBadge');
        if (!savedCode) {
          if (badge) badge.style.display = 'none';
        } else {
          if (badge) {
            badge.style.display = 'flex';
            const uName = localStorage.getItem('hdl_user_name') || 'Pengguna';
            const uEmail = localStorage.getItem('hdl_user_email') || '';
            const uPhoto = localStorage.getItem('hdl_user_photo') || '';
            const nameEl = document.getElementById('accountBadgeName');
            const emailEl = document.getElementById('accountBadgeEmail');
            const avatarInner = document.getElementById('accountBadgeAvatarInner');
            if (nameEl) nameEl.textContent = uName;
            if (emailEl) emailEl.textContent = uEmail;
            if (uPhoto && avatarInner) {
              avatarInner.innerHTML = '<img src="' + uPhoto + '" referrerpolicy="no-referrer" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.textContent=\'' + uName.charAt(0).toUpperCase() + '\'">'; 
            } else if (avatarInner) {
              avatarInner.textContent = uName.charAt(0).toUpperCase();
            }
            updateCloudSyncStatus('saved');
          }
        }
      } catch (e) { }
    }

    function logoutGoogle() {
      localStorage.removeItem('hdl_access_code');
      localStorage.removeItem('hdl_access_code_time');
      localStorage.removeItem('hdl_user_email');
      localStorage.removeItem('hdl_user_name');
      localStorage.removeItem('hdl_user_photo');
      window.location.href = 'index.html';
    }

    // Window load initialization
    window.addEventListener('load', () => {
      // Load saved identity fields
      loadProfileFields();
      checkLoginBadge();

      // Retrieve themes or styles from localStorage if any, to align with index page
      try {
        const savedPattern = localStorage.getItem('hdl_paper_pattern');
        if (savedPattern) {
          const patSelect = document.getElementById('paperPattern');
          if (patSelect) patSelect.value = savedPattern;
        }
        const savedTheme = localStorage.getItem('hdl_paper_theme_mode') || 'original';
        applyPresetTheme(savedTheme);
      } catch (e) {
        applyPresetTheme('original');
      }

      updatePageStyle();
      applyZoom();
      window.addEventListener('resize', applyZoom);
    });
  </script>
